spring.application.name=fake-store-productservice
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
fake-store-url=${FAKE_STORE_URL}
server.port=${SERVER_PORT:8082}
product.sync.cron=${PRODUCT_SYNC_CRON:0 0 0 * * *}
spring.data.web.pageable.serialization-mode=via-dto
spring.security.oauth2.resourceserver.jwt.public-key-location=classpath:public.pem
